name: Deploy (Railway)

on:
  push:
    branches: [main]
    paths:
      - "clean-backend/**"
      - ".github/workflows/railway-deploy.yml"
  workflow_dispatch:

concurrency:
  group: railway-deploy-clean-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_MIGRATE: migrate
      RAILWAY_SERVICE_API: tku
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy migrate
        run: railway up --ci --service "$RAILWAY_SERVICE_MIGRATE" --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT"
      - name: Deploy api
        run: railway up --ci --service "$RAILWAY_SERVICE_API" --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT"
