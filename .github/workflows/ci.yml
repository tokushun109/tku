name: CI
on:
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "frontend/pnpm-lock.yaml"
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm build
      - run: pnpm test
      - run: pnpm test-integration

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "backend/go.sum"
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest
      - name: Check import formatting
        run: |
          UNFORMATTED="$("$(go env GOPATH)"/bin/goimports -l .)"
          if [ -n "$UNFORMATTED" ]; then
            echo "Run goimports -w . before push"
            echo "$UNFORMATTED"
            exit 1
          fi
      - run: go build ./...
      - run: go test ./...

  lambda:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/lambda
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "infra/lambda/pnpm-lock.yaml"
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm type-check
      - run: pnpm build

  opentofu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/opentofu
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.0"
      - name: Check formatting
        run: tofu fmt -check -recursive
      - name: Initialize without a remote backend
        run: tofu init -backend=false
      - name: Validate configuration
        run: tofu validate
      - name: Initialize bootstrap configuration without a remote backend
        run: tofu -chdir=bootstrap init -backend=false
      - name: Validate bootstrap configuration
        run: tofu -chdir=bootstrap validate

  opentofu-plan:
    if: github.event.pull_request.head.repo.full_name == github.repository && vars.AWS_PLAN_ROLE_ARN != '' && vars.TOFU_STATE_BUCKET != ''
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/opentofu
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: "1.12.0"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ap-northeast-1
          role-session-name: tku-opentofu-plan-${{ github.event.pull_request.number }}
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
      - name: Initialize remote state
        run: |
          tofu init -reconfigure \
            -backend-config="bucket=${{ vars.TOFU_STATE_BUCKET }}" \
            -backend-config="key=tku/production/terraform.tfstate" \
            -backend-config="region=ap-northeast-1" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"
      - name: Plan production infrastructure
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: tofu plan -no-color -var-file=production.tfvars.example
