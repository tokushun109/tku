name: CI
on:
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "frontend/pnpm-lock.yaml"
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm build
      - run: pnpm test
      - run: pnpm test-integration

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "backend/go.sum"
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest
      - name: Check import formatting
        run: |
          UNFORMATTED="$("$(go env GOPATH)"/bin/goimports -l .)"
          if [ -n "$UNFORMATTED" ]; then
            echo "Run goimports -w . before push"
            echo "$UNFORMATTED"
            exit 1
          fi
      - run: go build ./...
      - run: go test ./...

  lambda:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/lambda
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "infra/lambda/pnpm-lock.yaml"
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm type-check
      - run: pnpm build

  opentofu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/opentofu
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.0"
      - name: Check formatting
        run: tofu fmt -check -recursive
      - name: Initialize without a remote backend
        run: tofu init -backend=false
      - name: Validate configuration
        run: tofu validate
      - name: Initialize bootstrap configuration without a remote backend
        run: tofu -chdir=bootstrap init -backend=false
      - name: Validate bootstrap configuration
        run: tofu -chdir=bootstrap validate
