services:
  # MySQL(clean-backend)
  db:
    build:
      context: ./clean-backend
      dockerfile: ./docker/db/Dockerfile
    container_name: mysql
    volumes:
      - ./clean-backend/docker/db/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./clean-backend/docker/db/initdb.d:/docker-entrypoint-initdb.d
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - DB_USER=root
      - DB_PASS=root
      - DB_NAME=tku
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -uroot -proot
    # healthcheck:
    #   test: mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER} -p${MYSQL_PASSWORD}
    ports:
      - 3306:3306
    command: mysqld --innodb_use_native_aio=0

  # DB migrations(clean-backend)
  migrate:
    build:
      context: ./clean-backend
      dockerfile: ./docker/migrations/Dockerfile
    container_name: migrate
    env_file: ./clean-backend/.env
    environment:
      MYSQL_HOST: mysql
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./clean-backend/db/migrations:/migrations

  # S3 compatible storage (MinIO) for clean-backend local development
  minio:
    image: minio/minio:latest
    container_name: minio
    env_file: ./clean-backend/.env
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio_data:/data

  # Initialize bucket for local development
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    env_file: ./clean-backend/.env
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 1; done;
      /usr/bin/mc mb -p local/$$API_BUCKET_NAME || true;
      exit 0;
      "

  # API(backend ※今後移行予定)
  api:
    build:
      context: ./backend/api
      dockerfile: ./docker/api/Dockerfile
    container_name: api
    env_file: ./backend/api/.env
    environment:
      MYSQL_HOST: mysql
    depends_on:
      - migrate
      - minio
      - minio-init
    command: sh ./docker/api/script/local/command.sh
    ports:
      - 8080:8080
    volumes:
      - ./backend/api:/api

  # FRONTEND
  frontend:
    build:
      context: ./frontend
      dockerfile: ./docker/Dockerfile
    container_name: frontend
    environment:
      BROWSER_BASE_URL: http://localhost:8080/api
      API_BASE_URL: http://host.docker.internal:8080/api
    depends_on:
      - api
    command: sh ./docker/script/local/command.sh
    ports:
      - 3000:3000
    volumes:
      - ./frontend:/frontend

volumes:
  minio_data:
